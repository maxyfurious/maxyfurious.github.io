<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaxyFurious Fursuit Studio</title>
    <style>
        /* Εδώ αλλάζουμε τα χρώματα και τις γραμματοσειρές */
        body {
            background-color: #1a1a1a; /* Σκούρο γκρι φόντο */
            color: #ffffff; /* Λευκό κείμενο */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Μοντέρνα γραμματοσειρά */
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #ff66b2; /* Έντονο ροζ/magenta για τον τίτλο */
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #cccccc; /* Απαλό γκρι για το κείμενο */
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Στυλ για τη φωτογραφία σου */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 15px; /* Στρογγυλεμένες γωνίες στη φωτογραφία */
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5); /* Σκιά γύρω από τη φωτογραφία */
        }
    </style>
</head>
<body>

    <h1>Καλώς ήρθατε στο MaxyFurious Fursuit Studio!</h1>
    <p>Σύντομα εδώ θα βρείτε πληροφορίες για commissions, τιμές και φωτογραφίες.</p>
    
    <!-- Εδώ βάλε ξανά το ακριβές όνομα της φωτογραφίας σου -->
    <img src="IMG_20260705_133301.jpg" alt="Το Fursuit μου">

</body>
</html>
